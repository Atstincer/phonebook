name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Simulating failure
        run: exit 1
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm install && cd frontend && npm install
      - name: Check style
        run: npm run lint
      - name: Tests
        run: echo "doing some tests"
  deploy:
    runs-on: ubuntu-latest
    needs: [build_and_test]
    if: ${{ github.event_name == 'push' && !contains(join(github.event.commits.*.message),'#skip') }}
    steps:
      - name: Trigger deployment
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
  notify_success:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ success() }}
    steps:
      - name: Notify discord if deployment success
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          notimestamp: true
          color: #90EE90
          content: ":white_check_mark: **Deployment Successfull!** A new version deployed to production"
          title: "Deployment details"
          url: ${{github.event.repository.html_url}}
          description: |
            **Commit:** ${{ github.event.head_commit.id }}
            **Message:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
  notify_failure:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ failure() }}
    steps:
      - name: Notify discord if deployment fails
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          notimestamp: true
          color: #ff0000
          content: ":x: **Build failed!** The pipeline encountered an error"
          title: "Failure details"
          description: |
            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.event.head_commit.id }}
            **Message:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            **Workflow:** ${{ github.workflow }}
            **Job:** ${{ github.job }}

            [View Commit](${{ github.event.head_commit.url }})
            [View Workflow Run](${{github.event.repository.html_url}}/actions/runs/${{github.run_id}}/job/${{job.check_run_id}})
